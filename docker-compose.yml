version: '3.8'

services:
  janusgraph:
    image: janusgraph/janusgraph:1.0.0
    ports:
      - "8182:8182"
    environment:
      - JAVA_OPTIONS=-Xms512m -Xmx2g
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8182' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  app:
    build: .
    depends_on:
      janusgraph:
        condition: service_healthy
    environment:
      - INFURA_RPC_URL=${INFURA_RPC_URL}
      - JANUSGRAPH_HOST=janusgraph
      - JANUSGRAPH_PORT=8182
    volumes:
      - ./data:/app/data
    command: python -m fetcher.dex_fetcher
    restart: on-failure

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - INFURA_RPC_URL=${INFURA_RPC_URL}
      - JANUSGRAPH_HOST=janusgraph
      - JANUSGRAPH_PORT=8182
    volumes:
      - ./data:/app/data
    restart: unless-stopped
